name: Daily competitor price scrape

# Cost control: runs ONCE per day. Do not lower this to hourly without good reason —
# each run starts one Apify actor run per (check-in date x stay length).
on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC daily
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape next 90 days (1 & 2 night stays, 2 adults)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PRICING_DEFAULT_CURRENCY: EUR
        run: python scripts/sync_apify.py scrape --days 90 --nights 1,2 --adults 2
