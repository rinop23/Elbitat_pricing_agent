name: Weekly competitor price scrape

# Cost control: runs ONCE per week (Monday 04:30 UTC). Each run starts one Apify
# actor run per (check-in date x stay length), so keep this weekly unless needed.
on:
  schedule:
    - cron: "30 4 * * 1"   # Mondays 04:30 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PRICING_DEFAULT_CURRENCY: EUR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape next 90 days (1 & 2 night stays, 2 adults)
        run: python scripts/sync_apify.py scrape --days 90 --nights 1,2 --adults 2

      - name: Build report (per night, 2-night stays)
        if: always()
        run: python scripts/sync_apify.py report --days 90 --nights 2 --per-night --out report.csv --summary-out report.txt

      # Email is disabled for now. The report is uploaded as a downloadable artifact —
      # open the workflow run on the Actions tab and download "rate-shopping-report".
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rate-shopping-report
          path: |
            report.csv
            report.txt
          retention-days: 30
